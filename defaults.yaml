standalone: true          # pandoc assumes standalone for EPUB
input-files:
    # chapter 1 all in one file
  - Notes/Procedures.md
  # chapter 2
  - Notes/DataAbstractions.md
  # Chapter 3, first file is the intro.
  - Notes/ModularityObjectsStateIntro.md
  - Notes/AssignmentAndLocalState.md
  - Notes/EnvironmentModelEvaluation.md
  - Notes/ModelingMutableData.md
  - Notes/Concurrency.md
  - Notes/Streams.md

output-file: SICPnotes.pdf

# css: styles.css
metadata:
  title: "SICP Notes"
  author: "Caesar X Insanium"
  # date would be automatic
  # date: "2026-07-03"
  lang: en
  description: "A collection of personal notes for SICP"
  keywords: [notes, knowledge, zettelkasten, scheme]

# Table of contents
toc: true
toc-depth: 2               # show headings down to level 2 in the TOC
standalone: true

# EPUB‑specific options
epub-chapter-level: 1       # split the EPUB into separate XHTML files at level‑1 headings
# epub-cover-image: cover.png # optional cover image (PNG/JPG, <1000px wide)

# Embed fonts (optional, repeat as needed)
# epub-embed-font:
#  - fonts/MyFont-Regular.ttf
#  - fonts/MyFont-Bold.ttf

# HTML specific options
html-math-method:
  method: mathml

highlight-style: pygments

## PDF Options
pdf-engine: xelatex
variables:
  mathml: true
  documentclass: book
  # classoption: [twocolumn, landscape]
  geometry:
    - top=30mm
    - left=20mm
    - heightrounded
  fontsize: 12pt
  mainfont: "Iosevka Slab"
  monofont: "Iosevka Term"
# FreeSerif
# Go, Go Mono
# Liberation Serif
